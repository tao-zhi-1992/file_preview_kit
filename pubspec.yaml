name: file_preview_kit
description: Flutter widgets and parsers for readable XLSX, CSV, and DOCX previews.
version: 0.0.2
repository: https://github.com/tao-zhi-1992/file_preview_kit
issue_tracker: https://github.com/tao-zhi-1992/file_preview_kit/issues
topics:
  - flutter
  - file-preview
  - xlsx
  - csv
  - docx

environment:
  sdk: ^3.10.9
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  archive: ">=3.6.1 <5.0.0"
  csv: ^8.0.0
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

